#
# Run pytest for IntelliKit packages (accordo, metrix, nexus, linex).
# Matrix: package × install_method (editable / non-editable).
# Non-editable exercises installed .so in package dir and would catch install bugs.

name: Intellikit Pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.build-matrix.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            accordo:
              - 'accordo/**'
            kerncap:
              - 'kerncap/**'
            linex:
              - 'linex/**'
            metrix:
              - 'metrix/**'
            nexus:
              - 'nexus/**'
            infra:
              - '.github/**'
              - 'apptainer/**'
              - 'docker/**'
              - 'install/**'
              - 'pyproject.toml'

      - name: Build package matrix
        id: build-matrix
        run: |
          ALL='["accordo","kerncap","linex","metrix","nexus"]'

          # Infra changes or non-PR events → test everything
          if [[ "${{ steps.filter.outputs.infra }}" == "true" || "${{ github.event_name }}" != "pull_request" ]]; then
            echo "packages=${ALL}" >> "$GITHUB_OUTPUT"
          else
            # Filter to only pytest-eligible packages (exclude rocm_mcp, uprof_mcp)
            CHANGED='${{ steps.filter.outputs.changes }}'
            FILTERED=$(echo "$CHANGED" | jq -c '[.[] | select(. == "accordo" or . == "kerncap" or . == "linex" or . == "metrix" or . == "nexus")]')
            echo "packages=${FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  build-container-image:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: [self-hosted, mi3xx]
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Apptainer (if not available)
        run: |
          if ! command -v apptainer &> /dev/null; then
            echo "Apptainer not found, installing..."
            apt-get update && apt-get install -y software-properties-common
            add-apt-repository -y ppa:apptainer/ppa
            apt-get update && apt-get install -y apptainer
          else
            echo "Apptainer already available"
          fi

      - name: Build Intellikit container
        run: |
          bash .github/scripts/container_build.sh

  pytest:
    name: pytest ${{ matrix.install_method }} - ${{ matrix.package }}
    needs: [detect-changes, build-container-image]
    runs-on: [self-hosted, mi3xx]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
        install_method: [editable, non-editable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pytest ${{ matrix.install_method }} - ${{ matrix.package }}
        run: |
          bash .github/scripts/container_exec.sh "
            if [ '${{ matrix.install_method }}' = 'editable' ]; then
              pip install -e ${{ matrix.package }}
            else
              pip install ./${{ matrix.package }}
            fi
            cd ${{ matrix.package }}
            python3 -m pytest tests -v --tb=short
          "
