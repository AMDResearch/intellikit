#
# End-to-end checks for install/tools/install.sh and install/skills/install.sh,
# plus editable and git+subdirectory pip installs. Commands run inside the
# Apptainer image built from apptainer/intellikit.def (see container_build.sh).
#
# Build and all install tests run in one job so the built .sif is on the same
# runner workspace as the tests (self-hosted runners may not share disk across jobs).

name: Intellikit Test Install

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test-install:
    runs-on: [self-hosted, mi3xx]
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Apptainer (if not available)
        run: |
          if ! command -v apptainer &> /dev/null; then
            echo "Apptainer not found, installing..."
            apt-get update && apt-get install -y software-properties-common
            add-apt-repository -y ppa:apptainer/ppa
            apt-get update && apt-get install -y apptainer
          else
            echo "Apptainer already available"
          fi

      - name: Build Intellikit container (apptainer/intellikit.def)
        run: |
          bash .github/scripts/container_build.sh

      - name: Run install test scripts inside container
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            HEAD_REPO="${{ github.repository }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          TOOLS_URL="https://raw.githubusercontent.com/${HEAD_REPO}/${HEAD_SHA}/install/tools/install.sh"
          SKILLS_URL="https://raw.githubusercontent.com/${HEAD_REPO}/${HEAD_SHA}/install/skills/install.sh"
          GIT_URL="https://github.com/${HEAD_REPO}.git"
          for script in \
            test_tools_install.sh \
            test_skills_install.sh \
            test_editable_install.sh \
            test_pip_subdir_install.sh
          do
            echo "========== ${script} =========="
            sub="${script%.sh}"
            bash .github/scripts/container_exec.sh "
              export INTELLIKIT_TOOLS_INSTALL_URL='${TOOLS_URL}'
              export INTELLIKIT_SKILLS_INSTALL_URL='${SKILLS_URL}'
              export INTELLIKIT_INSTALL_REF='${HEAD_SHA}'
              export INTELLIKIT_GIT_URL='${GIT_URL}'
              export INTELLIKIT_INSTALL_TEST_LOG_DIR=\"/intellikit_workspace/.github/ci-pip-logs/${sub}\"
              mkdir -p \"\$INTELLIKIT_INSTALL_TEST_LOG_DIR\"
              bash .github/scripts/${script}
            "
          done
