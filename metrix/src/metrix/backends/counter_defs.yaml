# Counter definitions for IntelliKit metrix
# Single source of truth for all architecture metric definitions.
# Uses counters available via rocprofv3 --list-avail (no proprietary data).
#
# Built-in variables available in expressions (from DeviceSpecs):
#   NUM_CU, MAX_WAVES_PER_CU, WAVEFRONT_SIZE, BASE_CLOCK_MHZ,
#   HBM_BANDWIDTH_GBS, L2_SIZE_MB, LDS_SIZE_PER_CU_KB,
#   DURATION_US
#
# Counter naming conventions (from rocm-systems / rocprofiler-compute):
#   GRBM_GUI_ACTIVE — GPU active cycles (convert to seconds: cycles / (clock_MHz * 1e6))
#   GRBM_COUNT — total elapsed cycles (including idle)
#   TCC_* — L2 cache (Texture Cache Channel) counters (CDNA)
#   GL2C_* — L2 cache (Global L2 Cache) counters (RDNA)
#   TCP_* — L1 vector cache (Texture Cache per Pipe) counters (CDNA only)
#   SQ_* — Shader Sequencer instruction counters
#
# HBM/VRAM request sizes and counter differences between architectures:
#   gfx942 (MI300) / gfx950 (MI350): L2-to-Fabric requests can be 32B, 64B, or 128B.
#     TCC_EA0_RDREQ_sum — total read requests (all sizes) via EA0 port
#     TCC_EA0_RDREQ_32B_sum — 32-byte read requests
#     TCC_BUBBLE_sum — 128-byte read requests
#     Remaining reads are 64B: (RDREQ - BUBBLE - RDREQ_32B)
#   gfx90a (MI200): Only 32B and 64B requests (no TCC_BUBBLE).
#     TCC_EA_RDREQ_sum — total read requests (aggregate of EA0+EA1 ports)
#     TCC_EA_RDREQ_32B_sum — 32-byte read requests
#     Remaining reads are 64B: (RDREQ - RDREQ_32B)
#   gfx1030/gfx1100 (RDNA2/3): L2-to-Fabric via GL2C_MC/GL2C_EA counters.
#     GL2C_MC_RDREQ_sum — total read requests (32B, 64B, 96B, or 128B)
#     GL2C_EA_RDREQ_32B_sum, GL2C_EA_RDREQ_64B_sum, GL2C_EA_RDREQ_96B_sum,
#     GL2C_EA_RDREQ_128B_sum — per-size read breakdowns
#     GL2C_MC_WRREQ_sum — total write requests (32B or 64B)
#     GL2C_EA_WRREQ_64B_sum — 64-byte write requests
#
# RDNA counter limitations (gfx1030/gfx1100/gfx1103):
#   - No per-dtype VALU counters (SQ_INSTS_VALU_ADD_F32 etc.) — only aggregate SQ_INSTS_VALU
#   - No MFMA counters (no matrix cores on RDNA2/3)
#   - No TCP (L1 cache) counters exposed via rocprof
#   - LDS bank conflicts use SQC_LDS_BANK_CONFLICT (not SQ_LDS_BANK_CONFLICT)
#   - Memory loads/stores use SQ_INSTS_TEX_LOAD/STORE (not SQ_INSTS_VMEM_RD/WR)
#
# gfx1201 (RDNA4) counter differences from RDNA2/3:
#   - GL2C_MC_RDREQ_sum and GL2C_MC_WRREQ_sum do not exist; use GL2C_EA_RDREQ_sum / GL2C_EA_WRREQ_sum
#   - GL2C_EA_RDREQ_96B_sum does not exist; only 32B, 64B, 128B read sizes
#   - TCP L1 counters are available (TCP_REQ, TCP_REQ_MISS) unlike older RDNA
#   - SDK derived counters available: LDSBankConflict, OccupancyPercent, LdsUtil
#
# gfx1201 available counters (rocprofv3 --list-avail):
#   GL2C (L2 cache):
#     GL2C_EA_RDREQ[_sum], GL2C_EA_RDREQ_32B[_sum], GL2C_EA_RDREQ_64B[_sum], GL2C_EA_RDREQ_128B[_sum]
#     GL2C_EA_WRREQ[_sum], GL2C_EA_WRREQ_64B[_sum], GL2C_EA_WRREQ_STALL[_max]
#     GL2C_HIT[_sum], GL2C_MISS[_sum], GL2C_MC_WRREQ_STALL, GL2C_WRREQ_STALL_max
#   GRBM (bus manager):
#     GRBM_COUNT, GRBM_GUI_ACTIVE
#   SQ (shader sequencer):
#     SQ_BUSY_CYCLES, SQ_WAVE_CYCLES, SQ_WAVES[_sum], SQ_WAVE32_INSTS, SQ_WAVE64_INSTS
#     SQ_INSTS_VALU, SQ_INSTS_SALU, SQ_INSTS_SMEM, SQ_INSTS_LDS, SQ_INSTS_FLAT
#     SQ_INSTS_TEX_LOAD, SQ_INSTS_TEX_STORE
#     SQ_INSTS_WAVE32, SQ_INSTS_WAVE32_VALU, SQ_INSTS_WAVE32_LDS
#     SQ_INST_CYCLES_VALU, SQ_INST_CYCLES_VMEM, SQ_INST_LEVEL_LDS, SQ_INSTS_VEC32_LEVEL_LDS
#     SQ_WAIT_ANY, SQ_WAIT_INST_ANY, SQ_ACCUM_PREV
#   SQC (shader cache):
#     SQC_ICACHE_REQ, SQC_ICACHE_HITS, SQC_ICACHE_MISSES
#     SQC_LDS_BANK_CONFLICT, SQC_LDS_IDX_ACTIVE
#   TA (texture addresser):
#     TA_TA_BUSY, TA_BUSY_avr, TA_BUSY_max, TA_BUSY_min
#     TA_BUFFER_LOAD_WAVEFRONTS[_sum], TA_BUFFER_STORE_WAVEFRONTS[_sum]
#   TCP (L1 cache):
#     TCP_REQ, TCP_REQ_MISS
#   SDK derived:
#     GPUBusy, GPU_UTIL, OccupancyPercent, MeanOccupancyPerCU, MeanOccupancyPerActiveCU
#     LDSBankConflict, LdsUtil, MemUnitBusy, VALUBusy, VALUInsts, SALUInsts
#     FetchSize, FETCH_SIZE, SFetchInsts, L0CacheHit, L2CacheHit
#     ValuPipeIssueUtil, Wavefronts, WriteUnitStalled, WAVE_DEP_WAIT, WAVE_ISSUE_WAIT

rocprofiler-sdk:
  counters:

    # --- GPU utilization ---
    # Fraction of elapsed cycles the GPU was actively executing work.

    - name: compute.gpu_utilization
      unit: Percent
      definitions:
        - expression: (GRBM_GUI_ACTIVE / GRBM_COUNT) * 100
          architectures: [gfx1201, gfx1151, gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]

    # rocprofiler-sdk built-in (see /opt/rocm/share/rocprofiler-sdk/counter_defs.yaml).
    # No expression: passthrough — pmc and CSV use the SDK name OccupancyPercent.
    - name: OccupancyPercent
      unit: Percent
      definitions:
        - architectures: [gfx1201]

    # --- Cache hit rates ---
    # L2 (TCC): hits / (hits + misses). L1 (TCP): misses go to L2 via TCC_READ_REQ.

    - name: memory.l2_hit_rate
      unit: Percent
      definitions:
        - expression: (TCC_HIT_sum / (TCC_HIT_sum + TCC_MISS_sum)) * 100
          architectures: [gfx942, gfx950, gfx90a]
        - expression: (GL2C_HIT_sum / (GL2C_HIT_sum + GL2C_MISS_sum)) * 100
          architectures: [gfx1201, gfx1151, gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]

    - name: memory.l1_hit_rate
      unit: Percent
      definitions:
        - expression: >-
            ((TCP_TOTAL_CACHE_ACCESSES_sum - TCP_TCC_READ_REQ_sum - TCP_TCC_WRITE_REQ_sum)
            / TCP_TOTAL_CACHE_ACCESSES_sum) * 100
          architectures: [gfx942, gfx950, gfx90a]

    # --- L2 bandwidth ---
    # (total L2 accesses * 128B cacheline) / kernel active time.
    # Time = GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6) converts cycles to seconds.

    - name: memory.l2_bandwidth
      unit: GB/s
      definitions:
        - expression: >-
            (((TCC_HIT_sum + TCC_MISS_sum) * 128) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx942, gfx950, gfx90a]
        - expression: >-
            (((GL2C_HIT_sum + GL2C_MISS_sum) * 128) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103, gfx1201, gfx1151]

    # --- Bytes transferred ---
    # Raw byte counts: requests * cacheline size.
    # L2 cacheline = 128B on all CDNA. L1 cacheline = 128B on gfx942/gfx950, 64B on gfx90a.

    - name: memory.bytes_transferred_l2
      unit: Bytes
      definitions:
        - expression: TCC_REQ_sum * 128
          architectures: [gfx942, gfx950, gfx90a]
        - expression: (GL2C_HIT_sum + GL2C_MISS_sum) * 128
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103, gfx1201, gfx1151]

    - name: memory.bytes_transferred_l1
      unit: Bytes
      definitions:
        - expression: TCP_TOTAL_CACHE_ACCESSES_sum * 128
          architectures: [gfx942, gfx950]
        - expression: TCP_TOTAL_CACHE_ACCESSES_sum * 64
          architectures: [gfx90a]

    # --- Coalescing and efficiency ---
    # Coalescing: how well the address unit (TA) merges thread requests into cache
    # accesses. 100% = fully coalesced (stride-1), 25% = worst case (each thread
    # hits a different cacheline). Formula: (mem_instructions * 16 / cache_accesses).
    # The factor 16 = wavefront_size(64) / threads_per_cacheline(4).
    # Load/store efficiency: ratio of issued instructions to L2 requests generated.

    - name: memory.coalescing_efficiency
      unit: Percent
      definitions:
        - expression: >-
            min(((SQ_INSTS_VMEM_RD + SQ_INSTS_VMEM_WR) * 16
            / TCP_TOTAL_ACCESSES_sum) * 100, 100.0)
          architectures: [gfx942, gfx950, gfx90a]

    - name: memory.global_load_efficiency
      unit: Percent
      definitions:
        - expression: >-
            min((SQ_INSTS_VMEM_RD / TCP_TCC_READ_REQ_sum) * 100, 100.0)
          architectures: [gfx942, gfx950, gfx90a]

    - name: memory.global_store_efficiency
      unit: Percent
      definitions:
        - expression: >-
            min((SQ_INSTS_VMEM_WR / TCP_TCC_WRITE_REQ_sum) * 100, 100.0)
          architectures: [gfx942, gfx950, gfx90a]

    # --- LDS ---
    # Bank conflicts per LDS instruction. 0 = no conflicts, >0 = serialized accesses.

    - name: memory.lds_bank_conflicts
      unit: Conflicts per Access
      definitions:
        - expression: SQ_LDS_BANK_CONFLICT / SQ_INSTS_LDS
          architectures: [gfx942, gfx950, gfx90a]
        # RDNA uses SQC_LDS_BANK_CONFLICT (cycles stalled) / SQC_LDS_IDX_ACTIVE (cycles active).
        # This gives the fraction of LDS cycles lost to bank conflicts, not conflicts per instruction.
        - expression: SQC_LDS_BANK_CONFLICT / SQC_LDS_IDX_ACTIVE
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]
        # gfx1201/gfx1151: SDK built-in (= 100 * SQC_LDS_BANK_CONFLICT / SQC_LDS_IDX_ACTIVE).
        # Returns percentage of GPU time LDS is stalled by bank conflicts.
        - expression: LDSBankConflict
          architectures: [gfx1201, gfx1151]

    # --- HBM/VRAM read bandwidth ---
    # Total bytes read from HBM (CDNA) or VRAM (RDNA) / kernel active time.
    # gfx942/gfx950: 3 request sizes — 128B (TCC_BUBBLE), 64B (remainder), 32B.
    # gfx90a: 2 request sizes — 64B (remainder), 32B. No 128B reads.
    # RDNA: 4 request sizes via GL2C_EA — 32B, 64B, 96B, 128B.

    - name: memory.hbm_read_bandwidth
      unit: GB/s
      definitions:
        - expression: >-
            ((TCC_BUBBLE_sum * 128
            + (TCC_EA0_RDREQ_sum - TCC_BUBBLE_sum - TCC_EA0_RDREQ_32B_sum) * 64
            + TCC_EA0_RDREQ_32B_sum * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx942, gfx950]
        - expression: >-
            (((TCC_EA_RDREQ_sum - TCC_EA_RDREQ_32B_sum) * 64
            + TCC_EA_RDREQ_32B_sum * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx90a]
        - expression: >-
            ((GL2C_EA_RDREQ_32B_sum * 32
            + GL2C_EA_RDREQ_64B_sum * 64
            + GL2C_EA_RDREQ_96B_sum * 96
            + GL2C_EA_RDREQ_128B_sum * 128) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]
        # gfx1201/gfx1151: per-size breakdown counters (GL2C_EA_RDREQ_{32B,64B,128B}_sum) are
        # broken (always 0). Use GL2C_EA_RDREQ_sum * 128B (L2 cacheline size) instead.
        - expression: >-
            ((GL2C_EA_RDREQ_sum * 128) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx1201, gfx1151]

    # --- HBM/VRAM write bandwidth ---
    # Total bytes written to HBM / kernel active time.
    # Writes are 64B or 32B only (no 128B writes on any arch).

    - name: memory.hbm_write_bandwidth
      unit: GB/s
      definitions:
        - expression: >-
            ((TCC_EA0_WRREQ_64B_sum * 64
            + (TCC_EA0_WRREQ_sum - TCC_EA0_WRREQ_64B_sum) * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx942, gfx950]
        - expression: >-
            ((TCC_EA_WRREQ_64B_sum * 64
            + (TCC_EA_WRREQ_sum - TCC_EA_WRREQ_64B_sum) * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx90a]
        - expression: >-
            ((GL2C_EA_WRREQ_64B_sum * 64
            + (GL2C_MC_WRREQ_sum - GL2C_EA_WRREQ_64B_sum) * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]
        # gfx1201/gfx1151: per-size breakdown counters broken.
        # Empirically verified: write requests are 64B on RDNA4.
        - expression: >-
            ((GL2C_EA_WRREQ_sum * 64) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
          architectures: [gfx1201, gfx1151]

    # --- HBM/VRAM bandwidth utilization ---
    # (actual read+write bandwidth) / (peak HBM bandwidth) * 100.

    - name: memory.hbm_bandwidth_utilization
      unit: Percent
      definitions:
        - expression: >-
            ((TCC_BUBBLE_sum * 128
            + (TCC_EA0_RDREQ_sum - TCC_BUBBLE_sum - TCC_EA0_RDREQ_32B_sum) * 64
            + TCC_EA0_RDREQ_32B_sum * 32
            + TCC_EA0_WRREQ_64B_sum * 64
            + (TCC_EA0_WRREQ_sum - TCC_EA0_WRREQ_64B_sum) * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
            / HBM_BANDWIDTH_GBS * 100
          architectures: [gfx942, gfx950]
        - expression: >-
            (((TCC_EA_RDREQ_sum - TCC_EA_RDREQ_32B_sum) * 64
            + TCC_EA_RDREQ_32B_sum * 32
            + TCC_EA_WRREQ_64B_sum * 64
            + (TCC_EA_WRREQ_sum - TCC_EA_WRREQ_64B_sum) * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
            / HBM_BANDWIDTH_GBS * 100
          architectures: [gfx90a]
        - expression: >-
            ((GL2C_EA_RDREQ_32B_sum * 32
            + GL2C_EA_RDREQ_64B_sum * 64
            + GL2C_EA_RDREQ_96B_sum * 96
            + GL2C_EA_RDREQ_128B_sum * 128
            + GL2C_EA_WRREQ_64B_sum * 64
            + (GL2C_MC_WRREQ_sum - GL2C_EA_WRREQ_64B_sum) * 32) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
            / HBM_BANDWIDTH_GBS * 100
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]
        # gfx1201/gfx1151: per-size breakdowns broken. Reads 128B, writes 64B.
        - expression: >-
            ((GL2C_EA_RDREQ_sum * 128
            + GL2C_EA_WRREQ_sum * 64) / 1e9)
            / (GRBM_GUI_ACTIVE / (BASE_CLOCK_MHZ * 1e6))
            / HBM_BANDWIDTH_GBS * 100
          architectures: [gfx1201, gfx1151]

    # --- Total HBM/VRAM bytes ---
    # Sum of all read + write bytes through L2-to-Fabric interface.

    - name: memory.bytes_transferred_hbm
      unit: Bytes
      definitions:
        - expression: >-
            TCC_BUBBLE_sum * 128
            + (TCC_EA0_RDREQ_sum - TCC_BUBBLE_sum - TCC_EA0_RDREQ_32B_sum) * 64
            + TCC_EA0_RDREQ_32B_sum * 32
            + TCC_EA0_WRREQ_64B_sum * 64
            + (TCC_EA0_WRREQ_sum - TCC_EA0_WRREQ_64B_sum) * 32
          architectures: [gfx942, gfx950]
        - expression: >-
            (TCC_EA_RDREQ_sum - TCC_EA_RDREQ_32B_sum) * 64
            + TCC_EA_RDREQ_32B_sum * 32
            + TCC_EA_WRREQ_64B_sum * 64
            + (TCC_EA_WRREQ_sum - TCC_EA_WRREQ_64B_sum) * 32
          architectures: [gfx90a]
        - expression: >-
            GL2C_EA_RDREQ_32B_sum * 32
            + GL2C_EA_RDREQ_64B_sum * 64
            + GL2C_EA_RDREQ_96B_sum * 96
            + GL2C_EA_RDREQ_128B_sum * 128
            + GL2C_EA_WRREQ_64B_sum * 64
            + (GL2C_MC_WRREQ_sum - GL2C_EA_WRREQ_64B_sum) * 32
          architectures: [gfx1030, gfx1031, gfx1032, gfx1100, gfx1101, gfx1102, gfx1103]
        # gfx1201/gfx1151: per-size breakdowns broken. Reads 128B, writes 64B.
        - expression: >-
            GL2C_EA_RDREQ_sum * 128
            + GL2C_EA_WRREQ_sum * 64
          architectures: [gfx1201, gfx1151]

    # --- Atomic latency ---
    # Average L2 cache atomic operation latency in GPU cycles.

    - name: memory.atomic_latency
      unit: Cycles
      definitions:
        - expression: TCC_EA0_ATOMIC_LEVEL_sum / TCC_EA0_ATOMIC_sum
          architectures: [gfx942, gfx950]
        - unsupported_reason: >-
            TCC_EA_ATOMIC_LEVEL_sum counter is broken on MI200 (gfx90a).
            This metric only works correctly on MI300X (gfx942) and newer GPUs.
          architectures: [gfx90a]

    # --- Compute: total FLOPS ---
    # VALU: 64 ops/instruction (wavefront_size=64). FMA counts as 2 FLOPs (mul+add).
    # MFMA: 512 FLOPs/instruction — all MFMA shapes on CDNA normalize to 512 ops
    # per MOPS counter increment (ref: AMD Matrix Instruction Calculator).

    - name: compute.total_flops
      unit: FLOPS
      definitions:
        - expression: >-
            WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64)
          architectures: [gfx942, gfx950, gfx90a]

    # --- Compute: GFLOPS ---
    # total_flops / 1e9 / kernel_duration_seconds.

    - name: compute.hbm_gflops
      unit: GFLOP/s
      definitions:
        - expression: >-
            ((WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64))
            / 1e9) / (DURATION_US / 1e6)
            if DURATION_US > 0 else 0.0
          architectures: [gfx942, gfx950, gfx90a]

    # --- Compute: HBM arithmetic intensity ---
    # total_flops / hbm_bytes_transferred. Key roofline metric.
    # High AI = compute-bound, low AI = memory-bound.

    - name: compute.hbm_arithmetic_intensity
      unit: FLOPs/Byte
      definitions:
        - expression: >-
            (WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64))
            / (TCC_BUBBLE_sum * 128
            + (TCC_EA0_RDREQ_sum - TCC_BUBBLE_sum - TCC_EA0_RDREQ_32B_sum) * 64
            + TCC_EA0_RDREQ_32B_sum * 32
            + TCC_EA0_WRREQ_64B_sum * 64
            + (TCC_EA0_WRREQ_sum - TCC_EA0_WRREQ_64B_sum) * 32)
          architectures: [gfx942, gfx950]
        - expression: >-
            (WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64))
            / ((TCC_EA_RDREQ_sum - TCC_EA_RDREQ_32B_sum) * 64
            + TCC_EA_RDREQ_32B_sum * 32
            + TCC_EA_WRREQ_64B_sum * 64
            + (TCC_EA_WRREQ_sum - TCC_EA_WRREQ_64B_sum) * 32)
          architectures: [gfx90a]

    # --- Compute: L2 arithmetic intensity ---
    # total_flops / l2_bytes. L2 cacheline = 128B.

    - name: compute.l2_arithmetic_intensity
      unit: FLOPs/Byte
      definitions:
        - expression: >-
            (WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64))
            / (TCC_REQ_sum * 128)
          architectures: [gfx942, gfx950, gfx90a]

    # --- Compute: L1 arithmetic intensity ---
    # total_flops / l1_bytes. L1 cacheline = 128B on gfx942/gfx950, 64B on gfx90a.

    - name: compute.l1_arithmetic_intensity
      unit: FLOPs/Byte
      definitions:
        - expression: >-
            (WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64))
            / (TCP_TOTAL_CACHE_ACCESSES_sum * 128)
          architectures: [gfx942, gfx950]
        - expression: >-
            (WAVEFRONT_SIZE * ((SQ_INSTS_VALU_ADD_F16 + SQ_INSTS_VALU_MUL_F16
            + SQ_INSTS_VALU_TRANS_F16 + SQ_INSTS_VALU_FMA_F16 * 2)
            + (SQ_INSTS_VALU_ADD_F32 + SQ_INSTS_VALU_MUL_F32
            + SQ_INSTS_VALU_TRANS_F32 + SQ_INSTS_VALU_FMA_F32 * 2)
            + (SQ_INSTS_VALU_ADD_F64 + SQ_INSTS_VALU_MUL_F64
            + SQ_INSTS_VALU_TRANS_F64 + SQ_INSTS_VALU_FMA_F64 * 2))
            + 512 * (SQ_INSTS_VALU_MFMA_MOPS_F16 + SQ_INSTS_VALU_MFMA_MOPS_BF16
            + SQ_INSTS_VALU_MFMA_MOPS_F32 + SQ_INSTS_VALU_MFMA_MOPS_F64))
            / (TCP_TOTAL_CACHE_ACCESSES_sum * 64)
          architectures: [gfx90a]
